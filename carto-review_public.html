// ── collectState ──────────────────────────────────────────────
function collectState() {
  const maps=[];
  document.querySelectorAll('.map-sheet').forEach(s=>{
    const mapId=s.id.replace('sheet-','');
    const meta={};
    const titleInput=s.querySelector('.map-title-input'); if(titleInput) meta['Map title']=titleInput.value;
    const metaLabels=s.querySelectorAll('.card-meta label');
    const metaInputs=s.querySelectorAll('.card-meta input');
    metaLabels.forEach((l,i)=>{if(metaInputs[i])meta[l.textContent]=metaInputs[i].value;});
    const rows={};
    Object.keys(rowState).forEach(rowId=>{
      if(!rowId.startsWith(mapId+'_')) return;
      const cb=document.getElementById('cb-'+rowId), ta=document.getElementById('ta-'+rowId);
      const rsSel=document.getElementById('rs-'+rowId);
      rows[rowId]={selected:rowState[rowId].selected,na:rowState[rowId].na,checked:!!cb?.classList.contains('checked'),taValue:ta?.value||'',rowStatus:rsSel?.value||rowState[rowId]?.rowStatus||'none',noteAuthor:rowState[rowId]?.noteAuthor||'',noteTs:rowState[rowId]?.noteTs||''};
    });
    const sectionOrder=Array.from(s.querySelectorAll('.section-block')).map(b=>parseInt(b.getAttribute('data-si')));
    const sectionOpen={};
    s.querySelectorAll('.section-block').forEach(b=>{
      const k=mapId+'_'+b.getAttribute('data-si');
      if(b.classList.contains('open')) sectionOpen[k]=true;
    });
    const dynamicLayers={};
    s.querySelectorAll('.section-block[data-si]').forEach(secBlock=>{
      const siKey=secBlock.getAttribute('data-si');
      if(!SECTIONS_DEF[parseInt(siKey)]?.isDynamic) return;
      const dynKey=`${mapId}_${siKey}`;
      const layers=[];
      secBlock.querySelectorAll('.layer-row').forEach(tr=>{
        const lid=tr.id.replace('row-','');
        const nameInput=tr.querySelector('.layer-name-input');
        const visibleBadge=tr.querySelector('.layer-type-select');
        const cb=tr.querySelector('.cb');
        const ta=tr.querySelector('.changes-textarea');
        const rsSel=tr.querySelector('.row-status-select');
        layers.push({layerName:nameInput?.value||'',layerType:visibleBadge?.value||'polygon',selected:rowState[lid]?.selected||[],na:!!rowState[lid]?.na,checked:!!cb?.classList.contains('checked'),taValue:ta?.value||'',rowStatus:rsSel?.value||rowState[lid]?.rowStatus||'none'});
      });
      dynamicLayers[dynKey]=layers;
    });
    const attachedFile=mapAttach[mapId]||null;
    const exportHistory=mapExportHistory[mapId]||[];
    const generalComment=document.getElementById('gcta-'+mapId)?.value||'';
    maps.push({mapId,meta,rows,sectionOrder,sectionOpen,dynamicLayers,attachedFile,exportHistory,generalComment,mode:currentMode});
  });
  return maps;
}

// ── Save HTML ─────────────────────────────────────────────────
function saveHTML() {
  const state=collectState();
  const proj=document.getElementById('project-name').value;
  const payload=JSON.stringify({maps:state,project:proj}).replace(/</g,'\\u003c').replace(/>/g,'\\u003e');
  const clone = document.documentElement.cloneNode(true);
  const cp = clone.querySelector('#content-pane'); if (cp) cp.innerHTML = '';
  const tb = clone.querySelector('#tab-bar');
  if (tb) {
    Array.from(tb.children).forEach(child => {
      if (!child.classList.contains('tab-add-btn') && child.id !== 'egg-dismiss' && child.id !== 'egg-text') child.remove();
    });
  }
  const ed = clone.querySelector('#egg-dismiss'); if (ed) ed.style.display = '';
  const et = clone.querySelector('#egg-text'); if (et) et.classList.remove('visible');
  const restoreScript = `<script>window.__RESTORE_STATE__=${payload};<\/script>`;
  const src = '<!DOCTYPE html>\n' + clone.outerHTML.replace('</head>', restoreScript + '</head>');
  const blob=new Blob([src],{type:'text/html'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const slug=proj.trim().replace(/[^a-z0-9]/gi,'_')||'review';
  a.download=`map_review_${slug}.html`; a.click(); URL.revokeObjectURL(a.href);
}

// ── Save Excel ────────────────────────────────────────────────
// Build a lookup: rowId → human element name, for Change Log
function buildElementNameLookup() {
  const lookup = {};
  document.querySelectorAll('.map-sheet').forEach(s => {
    const mapId = s.id.replace('sheet-','');
    // Static rows — pull name from el-name text node
    s.querySelectorAll('tbody tr[id^="row-"]').forEach(tr => {
      const rowId = tr.id.replace('row-','');
      const elName = tr.querySelector('.el-name');
      if (elName) {
        lookup[rowId] = elName.childNodes[0]?.textContent?.trim() || elName.textContent.trim();
      } else {
        const lname = tr.querySelector('.layer-name-input');
        lookup[rowId] = lname?.value?.trim() || 'Unnamed layer';
      }
    });
  });
  return lookup;
}

    function clCs(fill,font){return{fill,font,alignment:{wrapText:true,vertical:'top'},border:{bottom:clThin,right:clThin}};}

    clAoa.push([{v:'Change Log — '+proj,t:'s',s:{fill:clHF,font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:13},alignment:{horizontal:'left',vertical:'center'}}},'','','','','','']);
    clAoa.push([{v:'Appended: '+ts,t:'s',s:{fill:{patternType:'solid',fgColor:{rgb:'252525'}},font:{color:{rgb:'999999'},name:'Arial',sz:9}}},'','','','','','']);
    clAoa.push(['']);

    state.forEach(m => {
      const mapId = m.mapId;
      const allRounds = mapExportHistory[mapId]||[];
      if (!allRounds.length) return;
      clAoa.push([{v:m.meta['Map title']||'Untitled',t:'s',s:{fill:{patternType:'solid',fgColor:{rgb:'333333'}},font:{bold:true,color:{rgb:'FFFFFF'},name:'Arial',sz:11},alignment:{horizontal:'left',vertical:'center'}}},'','','','','','']);
      clAoa.push([
        {v:'Submission',     t:'s',s:clCs(clHF,clHFnt)},
        {v:'By',             t:'s',s:clCs(clHF,clHFnt)},
        {v:'Timestamp',      t:'s',s:clCs(clHF,clHFnt)},
        {v:'Element',        t:'s',s:clCs(clHF,clHFnt)},
        {v:'Status',         t:'s',s:clCs(clHF,clHFnt)},
        {v:'Note',           t:'s',s:clCs(clHF,clHFnt)},
        {v:'General Comment',t:'s',s:clCs(clHF,clHFnt)},
      ]);
      allRounds.forEach((rnd,ri) => {
        const wf     = {patternType:'solid',fgColor:{rgb:'FFFFFF'}};
        const rowIds = Object.keys(rnd.rows||{});
        const statusLblMap = {none:'—',mapper:'Mapper to fix',guidance:'Need guidance',good:'Good',na:'N/A'};
        const statusColour = s => s==='mapper'?'B05800':s==='guidance'?'1A56B0':s==='good'?'2E7D32':'888888';

        // Round label: describe the direction of this submission
        const isReviewer = rnd.exportedBy === 'reviewer';
        const roundLabel = isReviewer
          ? `Round ${ri+1} — Reviewer Comments`
          : `Round ${ri+1} — Sent for Review`;

        // Actual person name from meta
        const personName = isReviewer
          ? (m.meta['Reviewer'] || 'Reviewer')
          : (m.meta['Mapper']   || 'Mapper');

        // Row fill tint per direction
        const rndFill = isReviewer
          ? {patternType:'solid',fgColor:{rgb:'EEF3FF'}}
          : {patternType:'solid',fgColor:{rgb:'FFF8F0'}};

        if (!rowIds.length && !rnd.generalComment) {
          clAoa.push([
            {v:roundLabel,   t:'s',s:clCs(rndFill,{name:'Arial',sz:10,bold:true,color:{rgb:isReviewer?'1A56B0':'B05800'}})},
            {v:personName,   t:'s',s:clCs(rndFill,rowFontNorm)},
            {v:rnd.ts,       t:'s',s:clCs(rndFill,{name:'Courier New',sz:9})},
            {v:'(no changes)',t:'s',s:clCs(rndFill,{name:'Arial',sz:10,color:{rgb:'BBBBBB'},italic:true})},
            {v:'',t:'s',s:clCs(rndFill,rowFontNorm)},
            {v:'',t:'s',s:clCs(rndFill,rowFontNorm)},
            {v:'',t:'s',s:clCs(rndFill,rowFontNorm)},
          ]);
        } else {
          const allItems = rowIds.length ? rowIds : [null];
          allItems.forEach((rowId,idx)=>{
            const h = rowId ? rnd.rows[rowId] : null;
            const elemName    = rowId ? (h?.elemName || rowId) : '';
            const statusLabel = h ? (statusLblMap[h.status]||h.status) : '';
            const statusDisp  = h ? 'Changed to: '+statusLabel : '';
            clAoa.push([
              {v:idx===0?roundLabel:'',   t:'s',s:clCs(idx===0?rndFill:wf,{name:'Arial',sz:10,bold:idx===0,color:{rgb:isReviewer?'1A56B0':'B05800'}})},
              {v:idx===0?personName:'',   t:'s',s:clCs(idx===0?rndFill:wf,rowFontNorm)},
              {v:idx===0?rnd.ts:'',       t:'s',s:clCs(idx===0?rndFill:wf,{name:'Courier New',sz:9})},
              {v:elemName,                t:'s',s:clCs(wf,{name:'Arial',sz:10})},
              {v:statusDisp,              t:'s',s:clCs(wf,{name:'Arial',sz:10,bold:!!h,color:{rgb:h?statusColour(h.status):'888888'}})},
              {v:h?h.note:'',             t:'s',s:clCs(wf,{name:'Courier New',sz:9})},
              {v:idx===0?(rnd.generalComment||''):'',t:'s',s:clCs(idx===0?rndFill:wf,rowFontNorm)},
            ]);
          });
        }
      });
      clAoa.push(['']);
    });

    const wsCL = XLSX.utils.aoa_to_sheet(clAoa);
    wsCL['!cols'] = [{wch:10},{wch:12},{wch:16},{wch:28},{wch:20},{wch:44},{wch:40}];
    wsCL['!merges'] = [{s:{r:0,c:0},e:{r:0,c:6}},{s:{r:1,c:0},e:{r:1,c:6}}];
    XLSX.utils.book_append_sheet(wb, wsCL, 'Change Log');

    // ── 3. Trigger download ───────────────────────────────────
    const slug = proj.replace(/[^a-z0-9]/gi,'_')||'review';
    const wbout= XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob = new Blob([wbout],{type:'application/octet-stream'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`map_review_${slug}.xlsx`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);

  } catch(err) {
    console.error('Export error:',err);
    alert('Export failed: '+err.message);
  }
}

// ── Init ──────────────────────────────────────────────────────
if(window.__RESTORE_STATE__){
  const rs=window.__RESTORE_STATE__;
  if(rs.project){document.getElementById('project-name').value=rs.project;updateTitle();}
  if(rs.maps&&rs.maps.length) rs.maps.forEach(d=>addMap(d));
  else addMap();
}else{
  addMap();
}
</script>
</body>
